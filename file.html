<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Code</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="topbar">
      <a href="./"><strong>git.ayaan.is-a.dev</strong></a>
    </div>
    
    <div class="container">
      <div class="repo-header">
        <span>repo /</span> <strong id="title"></strong>
      </div>
    
      <div class="code-box">
        <div class="code-head" id="filename"></div>
        <pre id="code">Loading...</pre>
      </div>
    </div>

<script>
const params = new URLSearchParams(window.location.search);
const repo = params.get("repo");
const path = params.get("path");
const username = "AyaanDhalait";

document.getElementById("title").innerText = repo;
document.getElementById("filename").innerText = path;

function escapeHTML(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`)
.then(res => res.json())
.then(data => {
  let code = atob(data.content.replace(/\n/g,""));
  code = escapeHTML(code);

  code = code
    .replace(/(\/\/.*)/g,'<span class="com">$1</span>')
    .replace(/(#.*)/g,'<span class="com">$1</span>')
    .replace(/(".*?"|'.*?'|`.*?`)/g,'<span class="str">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>')
    .replace(/\b(function|return|if|else|for|while|import|from|class|const|let|var|def)\b/g,'<span class="kw">$1</span>')
    .replace(/\b([A-Z][A-Za-z0-9_]*)\b/g,'<span class="cls">$1</span>')
    .replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\(/g,'<span class="fn">$1</span>(');

  document.getElementById("code").innerHTML = code;
});
</script>

</body>
</html>
